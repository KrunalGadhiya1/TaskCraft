spring.application.name=taskcraft-backend

# MySQL profile for real database usage
server.port=8080

# --- Database (set real values in application-mysql.properties locally, but DO NOT commit secrets) ---
spring.datasource.url=jdbc:mysql://localhost:3306/taskcraft_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=CHANGE_ME
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# --- JWT ---
app.jwt.secret=CHANGE_ME_BASE64
app.jwt.expiration-ms=86400000

# --- Mail (optional) ---
app.mail.enabled=false
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=CHANGE_ME
spring.mail.password=CHANGE_ME
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

