spring.application.name=taskcraft-backend

# Production profile - all sensitive data must be provided via environment variables

server.port=${SERVER_PORT:8080}

# Database configuration - REQUIRED environment variables
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA configuration for production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false

# JWT configuration - REQUIRED environment variable for production
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Mail configuration - REQUIRED environment variables for production
app.mail.enabled=${MAIL_ENABLED:false}
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:none}
spring.mail.password=${MAIL_PASSWORD:none}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging configuration for production
logging.level.com.taskcraft=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR

# Server configuration
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never